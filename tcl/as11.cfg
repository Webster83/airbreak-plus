# ResMed AirSense 11
# Target: STM32H753 (Cortex-M7, 2MB dual-bank flash, HW crypto)
# DBGMCU_IDCODE: 0x20036450 (DEV_ID=0x450, REV_ID=0x2003 Rev V)

source [find target/stm32h7x_dual_bank.cfg]

adapter speed 4000

proc source_if_exists {path} {
    if {![catch {find $path} fullpath]} {
        source $fullpath
    }
}

# -----------------------------------------------------------------------
# AS11 Flash Memory Map
#
#   0x08000000 .. 0x0801FFFF   BLX       (bootloader)
#   0x08020000 .. 0x0803FFFF   CCX       (configuration)
#   0x08040000 .. 0x081FFFFF   CDX       (main firmware)
#
#   CRC16-BE: BLX at 0x1FFFE, CCX at 0x3FFFE, CDX at 0x1FFFFE
#   Dual bank boundary: bank1 0x08000000, bank2 0x08100000 (1MB each)
# -----------------------------------------------------------------------

# -----------------------------------------------------------------------
# STM32H753 Memory Map
#
#   Flash:       0x08000000  2MB (dual bank, 128KB sectors)
#   ITCM RAM:    0x00000000  64KB   (instruction TCM)
#   DTCM RAM:    0x20000000  128KB  (data TCM — BLX SP 0x20001058, CDX SP 0x2001E3F8)
#   AXI SRAM:    0x24000000  512KB  (D1 domain, cacheable)
#   SRAM1:       0x30000000  128KB  (D2 domain)
#   SRAM2:       0x30020000  128KB  (D2 domain)
#   SRAM3:       0x30040000  32KB   (D2 domain)
#   SRAM4:       0x38000000  64KB   (D3 domain)
#   Backup SRAM: 0x38800000  4KB    (battery-backed)
#
#   DBGMCU:      0x5C001000  (IDCODE + debug freeze)
#   FLASH regs:  0x52002000  (option bytes, programming)
#   RTC:         0x58004000
#   RTC BKP:     0x58004100  (BKP0R-BKP31R)
#   TAMP:        0x58004400
#   IWDG1:       0x58004800
#   SYSCFG:      0x58000400
#   System mem:  0x1FF00000  128KB  (ST ROM bootloader)
#   OTP:         0x08FFF000  1KB
#   Flash size:  0x1FF1E880  (u16, KB)
# -----------------------------------------------------------------------

# RTC Backup Register Addresses
set BKP0R 0x58004100
set BKP3R 0x5800410C
set BKP6R 0x58004118
set BKP7R 0x5800411C

proc global_help {} {
	echo "AirSense 11 OpenOCD Commands"
	echo "\tflash_new \[path\] : replace firmware with file at \[path\]"
	echo "\tdump             : backup full 2MB flash to as11.bin"
	echo "\tdump_all         : backup flash + all RAM + registers"
	echo "\tidentify         : read DBGMCU IDCODE and flash size"
	echo "\tdump_bkp         : show all 32 RTC backup registers"
	echo "\tfreeze_iwdg      : stop IWDG1 during debug halt"
}

proc dump_section {name addr size} {
	echo "Dumping $name, $size bytes at [format 0x%08X $addr]..."
	dump_image $name $addr $size
}

# RAM dumps

proc dump_dtcm {fname} {
	# DTCM: 128KB — both SP values land here
	dump_section $fname 0x20000000 0x20000
}

proc dump_axi_sram {fname} {
	# AXI SRAM: 512KB (D1 domain)
	dump_section $fname 0x24000000 0x80000
}

proc dump_d2_sram {fname} {
	# D2 domain SRAM1+SRAM2+SRAM3: 288KB
	dump_section $fname 0x30000000 0x48000
}

proc dump_d3_sram {fname} {
	# D3 domain SRAM4: 64KB
	dump_section $fname 0x38000000 0x10000
}

proc dump_ram_all {} {
	dump_dtcm     as11_dtcm.bin
	dump_axi_sram as11_axi_sram.bin
	dump_d2_sram  as11_d2_sram.bin
	dump_d3_sram  as11_d3_sram.bin
	echo "Done."
}

# Flash dump (2MB)
proc dump {} {
	dump_section as11.bin 0x08000000 0x200000
	echo "Done."
}

proc dump_all {} {
	dump_section as11_flash.bin 0x08000000 0x200000

	dump_section as11_syscfg.bin       0x58000400 0x400
	dump_section as11_bkpsram.bin      0x38800000 0x1000
	dump_section as11_rtc_bkpr.bin     0x58004100 0x80
	dump_section as11_tamp.bin         0x58004400 0x400
	dump_section as11_dbgmcu.bin       0x5C001000 0x100
	dump_section as11_sysmem.bin       0x1FF00000 0x20000
	dump_section as11_otp.bin          0x08FFF000 0x400

	dump_dtcm     as11_dtcm.bin
	dump_axi_sram as11_axi_sram.bin
	dump_d2_sram  as11_d2_sram.bin
	dump_d3_sram  as11_d3_sram.bin

	echo "Done."
}

proc check_image {path} {
	if [catch {find $path}] {
		echo "File $path not found!"
		return 1
	}
	return 0
}

proc postboot {} {}

# Chip identification
proc identify {} {
	set idcode [mrw 0x5C001000]
	echo "DBGMCU_IDCODE: [format 0x%08X $idcode]"

	set dev_id [expr {$idcode & 0xFFF}]
	set rev_id [expr {($idcode >> 16) & 0xFFFF}]
	echo "  DEV_ID: [format 0x%03X $dev_id]"
	echo "  REV_ID: [format 0x%04X $rev_id]"

	if {$dev_id != 0x450} {
		echo "  WARNING: expected 0x450 (H743/H753), got [format 0x%03X $dev_id]"
	}

	if {![catch {set fsz [mrh 0x1FF1E880]}]} {
		echo "  Flash: ${fsz} KB"
	} else {
		echo "  Flash: (0x1FF1E880 read failed — normal after some reset states)"
	}

	if {![catch {set optsr [mrw 0x5200201C]}]} {
		echo "  OPTSR_CUR: [format 0x%08X $optsr]"
		if {$optsr & 0x10} {
			echo "  IWDG1: software mode"
		} else {
			echo "  IWDG1: hardware mode (active)"
		}
	}
}

# Watchdog handling via manual FLASH register manipulation 
# stm32h7x option_write fails reliably (re-probes flash, reads 0x1FF1E880,
# gets garbage). Bypass it entirely: write FLASH_OPTSR_PRG directly.
#
# H7 FLASH registers (bank 0 base 0x52002000):
#   FLASH_KEYR1:     0x52002004  (flash unlock)
#   FLASH_OPTKEYR:   0x52002008  (option byte unlock)
#   FLASH_OPTCR:     0x52002018  (bit 0=OPTLOCK, bit 1=OPTSTRT)
#   FLASH_OPTSR_CUR: 0x5200201C  (current, read-only)
#   FLASH_OPTSR_PRG: 0x52002020  (programmable)
#   FLASH_SR1:       0x5200200C  (bit 0=BSY, bit 2=QW)
#
# OPTSR bit 4 = IWDG1_SW: 0=hardware, 1=software
#
# Unlock keys (RM0433 §3.4):
#   FLASH: KEY1=0x45670123, KEY2=0xCDEF89AB
#   OPT:   OPTKEY1=0x08192A3B, OPTKEY2=0x4C5D6E7F

proc read_option_status {} {
	set optsr [mrw 0x5200201C]
	echo "FLASH_OPTSR_CUR: [format 0x%08X $optsr]"
	if {$optsr & 0x10} {
		echo "  IWDG1_SW = 1 (software watchdog)"
	} else {
		echo "  IWDG1_SW = 0 (hardware watchdog)"
	}
}

proc flash_unlock {} {
	mww 0x52002004 0x45670123
	mww 0x52002004 0xCDEF89AB
}

proc opt_unlock {} {
	mww 0x52002008 0x08192A3B
	mww 0x52002008 0x4C5D6E7F
}

proc opt_wait {} {
	# Wait for BSY and QW to clear in FLASH_SR1, then OPT_BUSY in OPTSR_CUR
	set timeout 100
	for {set i 0} {$i < $timeout} {incr i} {
		set sr [mrw 0x5200200C]
		if {($sr & 0x05) == 0} break
		sleep 10
	}
	for {set i 0} {$i < $timeout} {incr i} {
		set optsr [mrw 0x5200201C]
		if {($optsr & 0x01) == 0} break
		sleep 10
	}
}

# Set IWDG1_SW bit in option bytes (1=software, 0=hardware)
# Requires: target halted, IWDG frozen via DBGMCU
proc iwdg_set_sw {val} {
	set optsr_prg [mrw 0x52002020]

	if {$val} {
		set optsr_prg [expr {$optsr_prg | 0x10}]
	} else {
		set optsr_prg [expr {$optsr_prg & ~0x10}]
	}

	flash_unlock
	opt_unlock

	# verify
	set optcr [mrw 0x52002018]
	if {$optcr & 0x01} {
		echo "ERROR: option bytes still locked (OPTCR=[format 0x%08X $optcr])"
		return
	}

	mww 0x52002020 $optsr_prg

	set optcr [mrw 0x52002018]
	set optcr [expr {$optcr | 0x02}]
	mww 0x52002018 $optcr

	opt_wait

	echo "OPTSR_PRG written: [format 0x%08X $optsr_prg]"
	read_option_status
}

proc halt_and_freeze {} {
	reset halt
	freeze_iwdg
}

# BKP register manipulation
# Placeholders from S10 pattern
#
# S10 reference:
#   BKP6R = 0x1B183CA7 -> fast boot
#   BKP6R = 0x91C1D9AA -> consumed sentinel
#   BKP3R = 0x5346      -> "SF" mode
#   BKP7R = 0x0000      -> success/complete

proc bkp_fix {} {
	global BKP6R BKP7R
	echo "Writing BKP registers..."
	#mww $BKP6R 0x91c1d9aa
	#mww $BKP7R 0x00000000
}

proc dump_bkp {} {
	echo "RTC Backup Registers (0x58004100)"
	for {set i 0} {$i < 32} {incr i} {
		set addr [expr {0x58004100 + $i * 4}]
		set val [mrw $addr]
		echo "  BKP${i}R ([format 0x%08X $addr]): [format 0x%08X $val]"
	}
}

# Flash programming
# stm32h7x option_write is broken (re-probes flash, fails on 0x1FF1E880).
# write FLASH_OPTSR_PRG directly via register manipulation instead.
proc flash_new {path {verify "1"}} {
	if [check_image $path] return

	reset halt
	freeze_iwdg

	echo "Switching IWDG to software mode..."
	iwdg_set_sw 1
	sleep 100

	reset halt

	# flash 
	echo "Overwriting flash memory (2MB)..."
	flash write_image erase $path 0x8000000
	if {$verify eq "1"} {
		echo "Verifying bank 0..."
		flash verify_bank 0 $path 0
		echo "Verifying bank 1..."
		flash verify_bank 1 $path 0x100000
	}

	echo "Restoring hardware watchdog..."
	halt
	freeze_iwdg
	iwdg_set_sw 0
	sleep 100

	echo "Resetting..."
	reset
	postboot
}

# Utility
proc mrw {reg} {
	return [lindex [read_memory $reg 32 1] 0]
}

proc mrh {reg} {
	return [lindex [read_memory $reg 16 1] 0]
}

proc mrb {reg} {
	return [lindex [read_memory $reg 8 1] 0]
}

# IWDG1 feed
proc iwdg_feed {} {
	mww 0x58004800 0x0000AAAA
}

# Freeze IWDG1 during debug halt
proc freeze_iwdg {} {
	set cr [mrw 0x5C001004]
	set cr [expr {$cr | 0x10}]
	mww 0x5C001004 $cr
	echo "IWDG1 frozen during debug halt"
}

# D-cache control
# if firmware uses cached AXI SRAM with DMA, memory views can show stale data
# Disable cache to force coherent reads, re-enable when done.
proc dcache_disable {} {
	set ccr [mrw 0xE000ED14]
	set ccr [expr {$ccr & ~0x10000}]
	mww 0xE000ED14 $ccr
	echo "D-cache disabled (memory reads now coherent)"
}

proc dcache_enable {} {
	set ccr [mrw 0xE000ED14]
	set ccr [expr {$ccr | 0x10000}]
	mww 0xE000ED14 $ccr
	echo "D-cache enabled"
}

#----------

init

if {![catch {freeze_iwdg}]} {
	echo "IWDG1 frozen for debug session"
}

if {![catch {identify}]} {
	echo ""
}

set backup_img as11.bin
echo "AirSense 11 (STM32H753) debug session ready."
if [check_image $backup_img] {
	echo "No flash backup found. Type 'dump' to save 2MB flash to as11.bin"
} else {
	echo "Flash backup exists. Type 'flash_new \[path\]' to upload firmware."
}
echo ""
echo "Commands: dump dump_all dump_bkp dump_ram_all identify freeze_iwdg"
echo "          iwdg_feed dcache_disable flash_new read_option_status"
echo ""


